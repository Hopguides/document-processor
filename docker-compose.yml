version: '3.8'

services:
  rag-system:
    build: .
    ports:
      - "5001:5001"
    environment:
      # API Keys - set these in .env file or environment
      - OPENAI_API_KEY=${OPENAI_API_KEY}
      - PINECONE_API_KEY=${PINECONE_API_KEY}
      - PINECONE_ENVIRONMENT=${PINECONE_ENVIRONMENT:-us-east-1-aws}
      - GOOGLE_API_KEY=${GOOGLE_API_KEY}
      - ANTHROPIC_API_KEY=${ANTHROPIC_API_KEY}
      # Flask settings
      - FLASK_ENV=production
      - PYTHONPATH=/app
    volumes:
      # Persist database and uploaded files
      - ./src/database:/app/src/database
      - ./src/api_keys.json:/app/src/api_keys.json
    restart: unless-stopped
    healthcheck:
      test: ["CMD", "curl", "-f", "http://localhost:5001/api/rag/health"]
      interval: 30s
      timeout: 10s
      retries: 3
      start_period: 40s